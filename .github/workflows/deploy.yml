# ┌───────────────────────────────────────────────────────────┐
# │ deploy.yml — CD(자동 배포) → Vercel. GitHub Actions가 실행. │
# │ main 브랜치에 push되면 Vercel CLI로 운영(production) 배포.   │
# │                                                             │
# │ 필요한 GitHub Secret 3개 (저장소 Settings → Secrets):        │
# │   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID            │
# │ (Secret이 없으면 이 워크플로는 조용히 건너뛴다)              │
# │                                                             │
# │ 참고: Vercel을 GitHub와 연동(Import)만 해두면 이 파일 없이도  │
# │       push마다 Vercel이 알아서 배포한다. 둘 중 하나만 쓰면 됨. │
# └───────────────────────────────────────────────────────────┘
name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN 미설정 → 배포 건너뜀 (Vercel Git 연동을 쓰면 이 워크플로 없이도 자동 배포됩니다)"
            exit 0
          fi
          npm install -g vercel
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
