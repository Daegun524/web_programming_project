# ┌───────────────────────────────────────────────────────────┐
# │ docker-compose.yml — 컨테이너 3개를 한 번에 켜는 설명서      │
# │                                                             │
# │ 컨테이너 = 프로그램 + 실행환경을 통째로 담은 "택배 상자".      │
# │ 아래 services 에 적은 db·api·web 세 상자가 함께 실행되며,     │
# │ 서로를 이름(db, api)으로 부를 수 있다.                        │
# │                                                             │
# │ 실행:  docker compose up --build   →  http://localhost:8080 │
# └───────────────────────────────────────────────────────────┘

services:
  # ── ① 데이터베이스 (PostgreSQL) ─────────────
  db:
    image: postgres:16-alpine     # 이미 만들어진 공식 Postgres 이미지 사용
    environment:                  # DB 계정/비번/이름 설정
      POSTGRES_USER: budget
      POSTGRES_PASSWORD: budget
      POSTGRES_DB: budget
      TZ: Asia/Seoul              # 한국 시간 기준으로 날짜(CURRENT_DATE) 계산
      PGTZ: Asia/Seoul
    volumes:
      # 데이터를 컨테이너 밖에 저장 → 컨테이너를 지워도 내역이 남음
      - pgdata:/var/lib/postgresql/data
      # 처음 켤 때 init.sql을 자동 실행시키려고 안에 넣어둠
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:                  # DB가 "준비됐는지" 주기적으로 확인
      test: ["CMD-SHELL", "pg_isready -U budget"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── ② 백엔드 API (Express) ──────────────────
  api:
    build:                        # 직접 만든 이미지를 사용 (설계도 = Dockerfile)
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgres://budget:budget@db:5432/budget  # db 컨테이너에 접속
      PORT: 3000
      TZ: Asia/Seoul             # 서버의 "이번 달" 계산도 한국 시간 기준
    depends_on:
      db:
        condition: service_healthy  # db가 준비된(healthy) 뒤에 켠다
    expose:
      - "3000"                    # 내부에서만 보임 (바깥에서 직접 접속 불가)

  # ── ③ Nginx (사용자가 접속하는 공개 입구) ────
  web:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "8080:80"                 # 내 컴퓨터의 8080 → 컨테이너의 80
    depends_on:
      - api

# 위 volumes에서 쓴 저장 공간 이름 선언
volumes:
  pgdata:
