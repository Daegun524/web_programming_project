# ┌───────────────────────────────────────────────────────────┐
# │ nginx.conf — Nginx(웹서버) 설정                             │
# │                                                             │
# │ Nginx는 사용자가 가장 먼저 만나는 "안내 데스크"다.            │
# │   주소가 /        이면 → React 화면 파일을 직접 건네주고       │
# │   주소가 /api/... 이면 → 뒤쪽 Express 서버로 요청을 넘긴다     │
# │ (이렇게 넘기는 것을 "리버스 프록시"라고 한다)                  │
# │ 화면과 API가 같은 주소를 쓰게 되어 CORS(다른 출처 차단) 없음.  │
# └───────────────────────────────────────────────────────────┘

server {
    listen 80;        # 80번 문(포트)으로 들어오는 요청을 받는다
    server_name _;    # 어떤 도메인이든 받음

    # 파일을 압축해서 보내 속도를 높인다 (수업: 성능 최적화)
    gzip on;
    gzip_types text/css application/javascript application/json;

    # 화면 파일들이 들어 있는 폴더와 기본 파일
    root /usr/share/nginx/html;
    index index.html;

    # 일반 주소: 해당 파일이 있으면 주고, 없으면 index.html (React는 1장짜리 SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api/ 로 시작하는 요청만 골라서 백엔드(api 컨테이너의 3000포트)로 전달
    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
